# Hourly tick for bill reminders. The endpoint owns the actual schedule:
# it reads reminder_config (portal → Household → Reminders) and only sends
# during the configured ET hour, at most once per day — so this just needs
# to fire every hour. Minute 7 dodges GitHub's top-of-hour cron congestion.
name: Bill reminders

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the reminders endpoint
        run: |
          curl -fsS -m 90 --retry 2 --retry-delay 15 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://utilities.aaronperkel.com/api/cron/reminders
